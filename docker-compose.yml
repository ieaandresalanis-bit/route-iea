version: '3.8'

services:
  # ── PostgreSQL + PostGIS ───────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: route-iea-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: route_iea
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: route-iea-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/route_iea
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: change-this-in-production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
